model_name_or_path: facebook/nllb-200-3.3B
data_path: ./training_data/xml
encoder_decoder_type: nllb

use_peft: false
#lora_rank: 16
#unfrozen_layers: layers.23

do_train: true
do_eval: true
eval_strategy: steps
do_predict: true
language_pairs: de-en,ru-en,zh-en,en-de,en-ru,en-zh
load_best_model_at_end: false
save_only_model: true
#max_steps: 2000

low_cpu_mem_usage: true
bf16: true

learning_rate: 0.0001
weight_decay: 0.001
gradient_accumulation_steps: 4
lr_scheduler_type: inverse_sqrt
warmup_ratio: 0.05

ignore_pad_token_for_loss: true
ignore_prompt_token_for_loss: true

per_device_train_batch_size: 4
per_device_eval_batch_size: 4

eval_steps: 0.05
save_strategy: steps
save_steps: 0.1
save_total_limit: 1

logging_strategy: steps
logging_steps: 0.05

output_dir: ./outputs/nllb-3b-lp
num_train_epochs: 1

wandb_project_name: labelpigeon
wandb_run_name: nllb-3b-lp
predict_with_generate: true
prediction_loss_only: true
max_new_tokens: 512
max_source_length: 512

seed: 42
overwrite_output_dir: true
num_beams: 5
ddp_timeout: 999999
report_to: wandb
overwrite_cache: true
